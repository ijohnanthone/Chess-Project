<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Chess Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #333;
            color: #eee;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            border: 4px solid #8B4513; /* SaddleBrown */
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.7);
        }

        .square {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            position: relative; /* For legal move highlight dot */
        }

        .light {
            background-color: #F0D9B5; /* Light square color */
        }

        .dark {
            background-color: #B58863; /* Dark square color */
        }

        .square.selected {
            background-color: #6aab32 !important; /* Green for selected piece */
        }

        .square.legal-move {
            cursor: pointer;
            background-color: rgba(106, 171, 50, 0.5) !important; /* Semi-transparent green for legal move */
        }

        .square.legal-move::after {
            content: '';
            display: block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.3); /* Dark dot */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; /* Allows click to pass through to the square */
        }

        .square.legal-move.capture::after {
             background-color: rgba(255, 0, 0, 0.3); /* Red dot for capture */
        }

        .piece {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            user-select: none; /* Prevent text selection */
        }

        .piece.white {
            color: #FFF;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .piece.black {
            color: #000;
            text-shadow: -1px -1px 0 #FFF, 1px -1px 0 #FFF, -1px 1px 0 #FFF, 1px 1px 0 #FFF;
        }

        #status {
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>2D Chess</h1>
        <div id="status">White to move</div>
        <div id="chessboard"></div>
    </div>

    <script type="module" src="./chess-logic.js"></script>
    <script type="module" src="./chess-ai.js"></script>
    <script type="module">
        import { getPieceColor, getLegalMoves, pieceUnicode } from './chess-logic.js';
        import { findBestMove, applyMove } from './chess-ai.js';

        const chessboard = document.getElementById('chessboard');
        const statusDisplay = document.getElementById('status');

        // Initial chess board state (FEN-like representation for easy setup)
        // Uppercase for White, lowercase for Black
        let board = [
            ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
            ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
            ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
        ];

        let selectedPiece = null; // { piece: 'P', startRow: 6, startCol: 0 }
        let currentPlayer = 'white'; // 'white' or 'black'
        const aiPlayer = 'black'; // AI plays as black

        function initializeBoard() {
            chessboard.innerHTML = ''; // Clear existing board
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    square.classList.add('square');
                    square.classList.add((r + c) % 2 === 0 ? 'light' : 'dark');
                    square.dataset.row = r;
                    square.dataset.col = c;
                    square.addEventListener('click', () => handleSquareClick(r, c));

                    const pieceChar = board[r][c];
                    if (pieceChar !== ' ') {
                        const pieceElement = document.createElement('span');
                        pieceElement.classList.add('piece');
                        pieceElement.classList.add(pieceChar === pieceChar.toUpperCase() ? 'white' : 'black');
                        pieceElement.innerHTML = pieceUnicode[pieceChar];
                        square.appendChild(pieceElement);
                    }
                    chessboard.appendChild(square);
                }
            }
            updateStatus();
        }

        function updateStatus() {
            statusDisplay.textContent = `${currentPlayer.charAt(0).toUpperCase() + currentPlayer.slice(1)} to move`;
        }

        function clearHighlights() {
            document.querySelectorAll('.square.selected').forEach(s => s.classList.remove('selected'));
            document.querySelectorAll('.square.legal-move').forEach(s => s.classList.remove('legal-move', 'capture'));
        }

        function handleSquareClick(row, col) {
            if (currentPlayer === aiPlayer) return; // Prevent human interaction during AI turn

            const clickedPieceChar = board[row][col];
            const clickedPieceColor = getPieceColor(clickedPieceChar);

            if (selectedPiece) {
                // A piece is already selected
                if (row === selectedPiece.startRow && col === selectedPiece.startCol) {
                    // Clicked the same piece again, deselect
                    selectedPiece = null;
                    clearHighlights();
                } else if (clickedPieceChar !== ' ' && clickedPieceColor === currentPlayer) {
                    // Clicked another piece of the current player, select new piece
                    selectedPiece = { piece: clickedPieceChar, startRow: row, startCol: col };
                    clearHighlights();
                    highlightMoves(selectedPiece);
                } else {
                    // Attempt to move or capture
                    const currentLegalMoves = getLegalMoves(board, selectedPiece.startRow, selectedPiece.startCol, currentPlayer);
                    const potentialMove = {
                        startRow: selectedPiece.startRow,
                        startCol: selectedPiece.startCol,
                        endRow: row,
                        endCol: col,
                        piece: selectedPiece.piece // Pass the piece character
                    };

                    const isLegal = currentLegalMoves.some(move =>
                        move.startRow === potentialMove.startRow &&
                        move.startCol === potentialMove.startCol &&
                        move.endRow === potentialMove.endRow &&
                        move.endCol === potentialMove.endCol
                    );

                    if (isLegal) {
                        makeMove(potentialMove);
                    } else {
                        // Invalid move, deselect
                        selectedPiece = null;
                        clearHighlights();
                    }
                }
            } else {
                // No piece selected
                if (clickedPieceChar !== ' ' && clickedPieceColor === currentPlayer) {
                    // Select a piece belonging to the current player
                    selectedPiece = { piece: clickedPieceChar, startRow: row, startCol: col };
                    highlightMoves(selectedPiece);
                }
            }
        }

        function highlightMoves(pieceData) {
            clearHighlights();
            const startSquare = document.querySelector(`[data-row="${pieceData.startRow}"][data-col="${pieceData.startCol}"]`);
            if (startSquare) {
                startSquare.classList.add('selected');
            }

            const moves = getLegalMoves(board, pieceData.startRow, pieceData.startCol, currentPlayer);
            moves.forEach(move => {
                const targetSquare = document.querySelector(`[data-row="${move.endRow}"][data-col="${move.endCol}"]`);
                if (targetSquare) {
                    targetSquare.classList.add('legal-move');
                    if (move.isCapture) {
                        targetSquare.classList.add('capture');
                    }
                }
            });
        }

        async function makeMove(move) {
            // Apply move to the board
            const { newBoard } = applyMove(board, move); // Use applyMove from AI for consistency
            board = newBoard; // Update the main board

            selectedPiece = null;
            clearHighlights();
            initializeBoard(); // Re-render the board

            // Switch player
            currentPlayer = (currentPlayer === 'white' ? 'black' : 'white');
            updateStatus();

            if (currentPlayer === aiPlayer) {
                await new Promise(resolve => setTimeout(resolve, 500)); // AI thinking delay
                makeAIMove();
            }
        }

        async function makeAIMove() {
            statusDisplay.textContent = "AI (Black) is thinking...";
            // Delay to make AI thinking visible
            await new Promise(resolve => setTimeout(resolve, 1000));

            const bestMove = findBestMove(board, aiPlayer);

            if (bestMove) {
                makeMove(bestMove); // AI makes its move
            } else {
                console.log("AI found no legal moves. Game over or stalemate!");
                statusDisplay.textContent = "AI has no legal moves. Game Over!";
            }
        }

        // Initialize the board when the script loads
        initializeBoard();
        // If AI starts, trigger AI move (e.g., if AI is white)
        // In this setup, AI is black, so white (human) moves first.
        // If AI was white:
        // if (currentPlayer === aiPlayer) {
        //     makeAIMove();
        // }

    </script>
</body>
</html>
